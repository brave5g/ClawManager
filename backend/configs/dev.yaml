  usernameAttribute: "uid"
  emailAttribute: "mail"
  nameAttribute: "cn"
  ldapFilter: ""
  allowUsernameOrEmailLogin: true
  autoCreateUser: true
  groupBaseDN: "ou=groups,dc=clawreef,dc=local"
  adminGroup: "clawreef-admins"
